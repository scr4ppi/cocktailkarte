<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocktail Menu</title>
</head>
<body>
    <h1>Cocktail Menu</h1>
    <div class="filter">
        <label for="categories">Categories:</label>
        <select id="categories">
            <option value="all">Alle</option>
            <option value="classic">Klassisch</option>
            <option value="fruity">Fruchtig</option>
            <option value="non-alcoholic">Alkoholfrei</option>
        </select>
    </div>
    <div class="cocktails">
        <div class="cocktail" data-category="classic" data-alcoholic="true" data-price="8">
            <h2>Mojito</h2>
            <p>Refreshing mint cocktail</p>
            <span class="stars" data-rating="5">★★★★★</span>
        </div>
        <div class="cocktail" data-category="classic" data-alcoholic="true" data-price="7">
            <h2>Martini</h2>
            <p>Classic gin cocktail</p>
            <span class="stars" data-rating="4">★★★★☆</span>
        </div>
        <div class="cocktail" data-category="fruity" data-alcoholic="true" data-price="9">
            <h2>Pina Colada</h2>
            <p>Sweet tropical cocktail</p>
            <span class="stars" data-rating="5">★★★★★</span>
        </div>
        <div class="cocktail" data-category="fruity" data-alcoholic="false" data-price="6">
            <h2>Virgin Piña Colada</h2>
            <p>Fruity non-alcoholic drink</p>
            <span class="stars" data-rating="3">★★★☆☆</span>
        </div>
        <div class="cocktail" data-category="classic" data-alcoholic="true" data-price="10">
            <h2>Old Fashioned</h2>
            <p>Strong whiskey cocktail</p>
            <span class="stars" data-rating="5">★★★★★</span>
        </div>
        <div class="cocktail" data-category="non-alcoholic" data-alcoholic="false" data-price="5">
            <h2>Shirley Temple</h2>
            <p>Sweet non-alcoholic drink</p>
            <span class="stars" data-rating="4">★★★★☆</span>
        </div>
    </div>
</body>
</html>
